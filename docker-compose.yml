services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:1.5.7
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat", "||", "exit", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:
